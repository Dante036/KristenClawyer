<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联系 · 陈律</title>
  <meta name="description" content="联系陈律，预约法律咨询。" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">陈律<span class="logo-sub"> · 法律服务</span></a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="articles.html">文章</a></li>
        <li><a href="contact.html" class="active">联系</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>联系陈律</h1>
      <p>有法律问题？我来帮你</p>
    </div>
  </div>

  <section class="contact-section">
    <div class="container contact-inner">
      <div class="contact-card">
        <img src="images/avanta.jpg" alt="小布布头像" class="contact-mascot" />
        <h2>预约咨询</h2>
        <p class="contact-desc">每个案件我都认真对待。请通过微信联系我，说明您的情况，我会尽快回复。</p>

        <div class="wechat-box">
          <div class="wechat-icon">💬</div>
          <div>
            <p class="wechat-label">微信联系</p>
            <p class="wechat-id">请扫码或搜索微信号</p>
          </div>
        </div>

        <div class="qr-card">
          <img src="images/wechat-qr.jpg" alt="陈律微信二维码" class="qr-image" />
        </div>

        <p class="contact-note">⏰ 工作日 9:00–18:00 回复，紧急情况请注明</p>
      </div>

      <div class="contact-info">
        <h3>常见问题</h3>
        <div class="faq-item">
          <h4>首次咨询收费吗？</h4>
          <p>首次简短咨询（15分钟内）免费，具体案件服务费用面议。</p>
        </div>
        <div class="faq-item">
          <h4>需要准备什么？</h4>
          <p>联系时简要描述您的情况，如有相关文件（合同、判决书等）可提前整理。</p>
        </div>
        <div class="faq-item">
          <h4>能远程提供服务吗？</h4>
          <p>可以，线上咨询、文件审查均可远程进行。</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <p class="footer-logo">陈律 · 法律服务</p>
      <p class="footer-mascot"><img src="images/avanta.jpg" alt="小布布头像" class="footer-mascot-avatar" />小布布陪你走</p>
      <p class="footer-copy">© 2026 陈律. 保留所有权利.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
